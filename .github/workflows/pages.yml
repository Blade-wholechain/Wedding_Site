# Build and deploy static site to GitHub Pages.
# After the first push: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Asset base path (Vite `base` / React Router):
# - Default: /REPO/ — correct for https://USER.github.io/REPO/
# - Custom domain (e.g. doelsenwyb.nl): Pages serves from site root. Add repo variable PAGESASSETBASE
#   (name must be letters/digits only — GitHub disallows underscores in variable names).
#   Settings → Secrets and variables → Actions → Variables → PAGESASSETBASE = /  then re-run workflow.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          VITE_BASE_PATH: ${{ vars.PAGESASSETBASE || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          npm run build

      # GitHub Pages has no SPA fallback; this makes deep links load the app shell.
      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Required on the deploy job (not only workflow-wide) for OIDC + Pages API.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
